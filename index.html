<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정책자금 백과 | 소상공인·창업·중소기업 정부지원금 한눈에 보기</title>
<meta name="description" content="소상공인 정책자금, 창업지원금, 중소기업 대출, 고용지원금 정보를 한눈에. 지원 대상부터 신청 방법까지 정리">
<style>
@font-face{font-family:'A2z';src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-6@1.0/에이투지체-4Regular.woff2') format('woff2');font-weight:400;font-display:swap}
@font-face{font-family:'A2z';src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-6@1.0/에이투지체-7Bold.woff2') format('woff2');font-weight:700;font-display:swap}
:root{--ink:#0f172a;--ink2:#334155;--ink3:#64748b;--ink4:#94a3b8;--sur:#f8f7f5;--sur2:#f1efe9;--white:#fff;--line:rgba(15,23,42,.07);--line2:rgba(15,23,42,.13);--blue:#1a56db;--blue-bg:#eff5ff;--blue-t:#1e429f;--green-bg:#f0fdf4;--green-t:#166534;--amber-bg:#fffbeb;--amber-t:#92400e;--red-bg:#fff1f2;--red-t:#9f1239;--pur-bg:#f5f3ff;--pur-t:#5b21b6;--r:8px;--r2:14px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'A2z','Noto Sans KR',sans-serif;background:var(--sur);color:var(--ink);line-height:1.75}
a{color:inherit;text-decoration:none}
/* Header */
header{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.h-top{max-width:1080px;margin:0 auto;padding:0 24px;height:60px;display:flex;align-items:center;gap:16px}
.logo{display:flex;flex-direction:column;cursor:pointer;flex-shrink:0}
.logo-main{font-size:18px;font-weight:700;color:var(--ink);letter-spacing:-.4px}.logo-main span{color:var(--blue)}
.logo-sub{font-size:10px;color:var(--ink4);text-transform:uppercase;letter-spacing:.3px}
.h-nav{display:flex;align-items:center;gap:2px;margin-left:auto}
.h-nav a{font-size:14px;color:var(--ink3);padding:6px 11px;border-radius:6px;transition:all .15s;cursor:pointer}
.h-nav a:hover{color:var(--ink);background:var(--sur2)}
/* Layout */
.page{max-width:1080px;margin:0 auto;padding:28px 24px 80px}
.wrap{max-width:1080px;margin:0 auto;padding:28px 24px 80px;display:grid;grid-template-columns:1fr 280px;gap:40px;align-items:start}
/* Loading */
.loader{text-align:center;padding:100px 0;color:var(--ink3);font-size:14px}
.spinner{width:30px;height:30px;border:3px solid var(--line);border-top:3px solid var(--blue);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
/* Main Landing */
.intro-box{background:var(--white);border:1px solid var(--line);border-radius:var(--r2);padding:28px;margin-bottom:24px}
.intro-tag{display:inline-block;font-size:11px;font-weight:600;color:var(--blue);background:var(--blue-bg);padding:3px 10px;border-radius:4px;margin-bottom:12px}
.intro-box h1{font-size:22px;font-weight:700;color:var(--ink);letter-spacing:-.4px;margin-bottom:8px;line-height:1.38}
.intro-box p{font-size:14px;color:var(--ink3);line-height:1.7;margin-bottom:18px}
.intro-btns{display:flex;gap:8px;flex-wrap:wrap}
.btn-pri{display:inline-block;background:var(--blue);color:var(--white);border:none;border-radius:6px;padding:9px 18px;font-size:13.5px;font-weight:600;font-family:'A2z',sans-serif;cursor:pointer;transition:background .13s}
.btn-pri:hover{background:var(--blue-t)}
/* Category Layout */
.cat-hero{background:var(--white);border:1px solid var(--line);border-radius:var(--r2);padding:28px;margin-bottom:24px}
.cat-badge{display:inline-flex;background:var(--blue-bg);color:var(--blue-t);font-size:12px;font-weight:600;padding:4px 12px;border-radius:12px;margin-bottom:12px}
.cat-hero h1{font-size:24px;font-weight:700;color:var(--ink);line-height:1.4;margin-bottom:12px;letter-spacing:-.4px}
.cat-intro{font-size:14px;color:var(--ink3);line-height:1.8;max-width:680px}
.fund-list{margin-bottom:32px}
.sec-head{display:flex;align-items:baseline;gap:8px;margin-bottom:12px}
.sec-name{font-size:15px;font-weight:700;color:var(--ink2)}.sec-cnt{font-size:12px;color:var(--ink4)}
.fcard-link{display:block;cursor:pointer}
.fcard{background:var(--white);border-radius:var(--r);padding:18px 20px;margin-bottom:2px;border:1px solid transparent;transition:border-color .15s,box-shadow .15s}
.fcard:hover{border-color:var(--line2);box-shadow:0 2px 14px rgba(15,23,42,.07)}
.fc-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.tag{display:inline-flex;align-items:center;font-size:12px;font-weight:600;padding:3px 8px;border-radius:4px}
.tb{background:var(--blue-bg);color:var(--blue-t)}.tg{background:var(--green-bg);color:var(--green-t)}.ta{background:var(--amber-bg);color:var(--amber-t)}.tr{background:var(--red-bg);color:var(--red-t)}.tp{background:var(--pur-bg);color:var(--pur-t)}.torg{background:var(--sur2);color:var(--ink3)}
.fc-title{font-size:15px;font-weight:700;color:var(--ink);line-height:1.45;margin-bottom:6px}
.fcard:hover .fc-title{color:var(--blue)}
.fc-desc{font-size:13px;color:var(--ink3);line-height:1.65;margin-bottom:11px}
.fc-meta{display:flex;gap:16px;align-items:center;flex-wrap:wrap}.fm{font-size:12px;color:var(--ink4)}.fm b{color:var(--ink2);font-weight:500}.fm-more{margin-left:auto;font-size:12px;color:var(--blue);font-weight:600}
.faq-section{background:var(--white);border:1px solid var(--line);border-radius:var(--r2);padding:24px 28px;margin-bottom:24px}
.faq-section h2{font-size:16px;font-weight:700;color:var(--ink);margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid var(--blue)}
.faq-item{border:1px solid var(--line);border-radius:var(--r);padding:16px 20px;margin-bottom:10px}
.faq-q{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:6px}.faq-a{font-size:13px;color:var(--ink3);line-height:1.75}
/* Sidebar */
.sb{display:flex;flex-direction:column;gap:20px}
.sb-box{background:var(--white);border:1px solid var(--line);border-radius:8px;padding:20px}
.sb-title{font-size:14px;font-weight:700;color:var(--ink2);margin-bottom:12px}
.sb-link{display:flex;justify-content:space-between;align-items:center;color:var(--ink3);font-size:13px;padding:7px 0;border-bottom:1px solid var(--line);transition:color .12s;cursor:pointer}
.sb-link:last-child{border:none;padding-bottom:0}
.sb-link:hover{color:var(--blue)}
.sb-link-num{font-size:12px;color:var(--ink4)}
.sb-tip{font-size:12px;color:var(--ink3);line-height:1.7;padding:6px 0;border-bottom:1px solid var(--line)}
.sb-tip:last-child{border:none;padding-bottom:0}
/* Detail Page */
.breadcrumb-nav{font-size:12px;color:var(--ink4);margin-bottom:12px}.breadcrumb-nav a{color:var(--blue);cursor:pointer}
.d-card{background:var(--white);border-radius:var(--r2);overflow:hidden;border:1px solid var(--line);margin-bottom:24px}
.d-top{padding:26px 26px 22px;border-bottom:1px solid var(--line)}
.d-tags{display:flex;gap:5px;margin-bottom:10px}
.d-title{font-size:22px;font-weight:700;color:var(--ink);line-height:1.38;margin-bottom:10px;letter-spacing:-.5px}
.d-desc{font-size:14px;color:var(--ink3);line-height:1.75}
.d-summary{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--line)}
.d-si{padding:18px 22px;border-right:1px solid var(--line)}.d-si:last-child{border-right:none}
.d-sl{font-size:11px;color:var(--ink4);letter-spacing:.4px;text-transform:uppercase;margin-bottom:6px}
.d-sv{font-size:19px;font-weight:700;color:var(--blue)}.d-sv.ink{color:var(--ink);font-size:15px}
.d-body{padding:24px 26px}
.d-stitle{font-size:12px;font-weight:700;color:var(--ink4);letter-spacing:.8px;text-transform:uppercase;margin:22px 0 12px;padding-top:22px;border-top:1px solid var(--line)}
.d-stitle:first-child{margin-top:0;padding-top:0;border-top:none}
.info-rows{display:flex;flex-direction:column}
.info-row{display:flex;border-bottom:1px solid var(--line);padding:11px 0}.info-row:last-child{border-bottom:none}
.info-k{width:110px;flex-shrink:0;font-size:13px;color:var(--ink3)}.info-v{flex:1;font-size:13px;color:var(--ink);line-height:1.7}
.step-list{display:flex;flex-direction:column;gap:10px}
.step-item{display:flex;gap:12px;align-items:flex-start}
.step-n{width:22px;height:22px;border-radius:50%;background:var(--blue);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-t{font-size:13px;color:var(--ink2);line-height:1.65}
.official-btn{display:flex;align-items:center;background:var(--blue-bg);border:1px solid rgba(26,86,219,.15);border-radius:var(--r);padding:14px 18px;margin-top:20px;transition:background .15s;width:100%;text-align:left}
.official-btn:hover{background:#dce9fd}
.ob-text strong{display:block;font-size:13px;font-weight:700;color:var(--blue-t)}.ob-text span{font-size:12px;color:var(--ink3)}
/* Ad & Subnav */
.c-strip{background:#0f172a;height:46px;display:flex;align-items:center;display:none}
.c-strip-in{max-width:1080px;margin:0 auto;padding:0 24px;width:100%;display:flex;align-items:center;justify-content:space-between;gap:16px}
.c-strip-label{font-size:14px;color:rgba(255,255,255,.55);display:flex;align-items:center;gap:9px}
.c-strip-label strong{color:rgba(255,255,255,.92);font-weight:700;font-size:14px}
.btn-strip{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);color:rgba(255,255,255,.9);font-size:13px;font-weight:600;padding:6px 16px;border-radius:14px;transition:background .15s}
.btn-strip:hover{background:rgba(255,255,255,.22)}
.pnav{background:var(--white);border-bottom:1px solid var(--line);overflow-x:auto;scrollbar-width:none;position:sticky;top:60px;z-index:90;display:none}
.pnav::-webkit-scrollbar{display:none}
.pnav-in{max-width:1080px;margin:0 auto;padding:0 20px;display:flex;align-items:center;gap:0}
.pnav-tab{font-size:13px;color:var(--ink3);padding:10px 13px;white-space:nowrap;border-bottom:2px solid transparent;cursor:pointer;font-weight:500;transition:color .13s}
.pnav-tab:hover{color:var(--ink)}
.pnav-tab.cur{color:var(--blue);border-bottom-color:var(--blue);font-weight:700}
/* Footer */
footer{background:var(--white);border-top:1px solid var(--line);padding:28px 24px;margin-top:auto}
.foot-in{max-width:1080px;margin:0 auto;display:flex;flex-direction:column;gap:10px}
.foot-links{display:flex;flex-wrap:wrap;gap:6px 20px;justify-content:center}
.foot-links a{font-size:12px;color:var(--ink4)}.foot-links a:hover{color:var(--blue)}
.foot-copy{font-size:12px;color:var(--ink4);text-align:center}
.foot-notice{font-size:11px;color:var(--ink4);text-align:center;line-height:1.7;max-width:680px;margin:0 auto}

@media(max-width:860px){.wrap{grid-template-columns:1fr}.sb{display:none}.d-summary{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.h-nav a:not(:first-child):not(:nth-child(2)){display:none}}
</style>
</head>
<body>

      <span class="logo-sub">Government Fund Guide</span>

    <nav class="h-nav">
      <a onclick="navigate('/전체-정책자금/')">전체</a>

<nav class="pnav" id="pnav">

    <a onclick="navigate('/창업지원금-종류/')" class="pnav-tab" data-path="/창업지원금-종류/">창업</a>
    <a onclick="navigate('/중소기업-정책자금/')" class="pnav-tab" data-path="/중소기업-정책자금/">중소기업</a>
    <a onclick="navigate('/고용지원금-신청방법/')" class="pnav-tab" data-path="/고용지원금-신청방법/">고용</a>
    <a onclick="navigate('/비사업자-서민금융/')" class="pnav-tab" data-path="/비사업자-서민금융/">서민금융</a>

  </div>
</footer>

<script>
const API_URL = 'https://bizinfotest.wlstj86231.workers.dev/';

function renderLoading() {
  document.getElementById('app').innerHTML = `
    <div class="page">
      <div class="loader"><div class="spinner"></div>데이터를 불러오는 중입니다...</div>
    </div>
  `;
}

function updateNav(path) {
  const isMain = path === '/' || path === '/index.html';
  document.getElementById('c-strip').style.display = isMain ? 'none' : 'flex';
  document.getElementById('pnav').style.display = isMain ? 'none' : 'block';
  
  document.querySelectorAll('.pnav-tab').forEach(t => {
    t.classList.remove('cur');
    if(path.startsWith(t.dataset.path.replace(/\/$/, ''))) t.classList.add('cur');
  });
}

async function renderMain() {
  updateNav('/');
  const html = `
    <div class="wrap">
      <main>
        <div class="intro-box">
          <span class="intro-tag">정책자금 정보</span>
          <h1>소상공인·창업·중소기업<br>정부 지원금 한눈에 보기</h1>
          <p>소상공인시장진흥공단, 중소벤처기업진흥공단 등 정부 기관의 정책자금 정보를 한 곳에 모았습니다. 지원 대상, 한도, 금리, 신청 방법까지 정리했습니다.</p>
          <div class="intro-btns">
            <a onclick="navigate('/전체-정책자금/')" class="btn-pri">전체 정책자금 보기</a>
          </div>
        </div>
        <div class="sec-label">카테고리별 지원 정보</div>
        <div class="fund-list" id="main-preview-list">
           <div class="loader"><div class="spinner"></div>주요 자금을 불러오는 중입니다...</div>
        </div>
      </main>
      <aside class="sb">
        <div class="sb-box">
          <div class="sb-title">카테고리</div>
          <a onclick="navigate('/소상공인-정책자금/')" class="sb-link">소상공인<span class="sb-link-num">→</span></a>
          <a onclick="navigate('/창업지원금-종류/')" class="sb-link">창업 · 스타트업<span class="sb-link-num">→</span></a>
          <a onclick="navigate('/중소기업-정책자금/')" class="sb-link">중소기업<span class="sb-link-num">→</span></a>
        </div>
        <div class="sb-box">
          <div class="sb-title">알아두면 좋은 점</div>
          <div class="sb-tip">정책자금은 예산 소진 시 조기 마감됩니다. 공고 후 빠르게 확인하세요.</div>
          <div class="sb-tip">신용이 낮아도 신보·기보 보증서를 활용하면 대출이 가능할 수 있습니다.</div>
        </div>
      </aside>
    </div>
  `;
  document.getElementById('app').innerHTML = html;
  
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    let cards = '';
    if(data.items && data.items.length > 0){
      cards = data.items.slice(0, 5).map(item => `
        <a onclick="navigate('/${item.title.split(' —')[0]}/')" class="fcard-link">
          <div class="fcard">
            <div class="fc-tags"><span class="tag tb">${item.cate || '정책자금'}</span><span class="tag torg">${item.org || '정부기관'}</span></div>
            <div class="fc-title">${item.title}</div>
            <div class="fc-desc">${item.summary || '상세 내용을 확인하세요.'}</div>
            <div class="fc-meta"><span class="fm-more">자세히 보기 →</span></div>
          </div>
        </a>
      `).join('');
    } else {
      cards = '<p>현재 불러올 수 있는 정책자금 데이터가 없습니다.</p>';
    }
    document.getElementById('main-preview-list').innerHTML = cards;
  } catch(e) {
    document.getElementById('main-preview-list').innerHTML = '<p>데이터를 불러오는데 실패했습니다.</p>';
  }
}

async function renderCategory(path) {
  updateNav(path);
  renderLoading();
  let cateName = decodeURI(path).replace(/\//g, '').split('-')[0];
  if(cateName === '전체') cateName = '';
  
  const titleMap = {
    '소상공인': '소상공인 정책자금 및 대출 정보',
    '창업지원금': '창업지원금 종류 및 신청 자격 총정리',
    '창업': '창업지원금 종류 및 신청 자격 총정리',
    '중소기업': '중소기업 정책자금 및 지원사업',
    '고용지원금': '고용지원금 종류 및 신청방법',
    '고용': '고용지원금 종류 및 신청방법',
    '비사업자': '비사업자 서민금융 및 생활자금',
    '': '전체 정책자금 모아보기'
  };
  
  const h1 = titleMap[cateName] || `${cateName} 정책자금 정보`;
  const desc = cateName ? `${cateName}을 위한 정부 지원금 정보를 한곳에 모았습니다. 지원대상, 한도, 금리, 신청방법을 확인하세요.` : '정부 부처 및 지자체에서 운영하는 모든 정책자금 정보를 확인하세요.';
  
  try {
    const res = await fetch(API_URL + (cateName ? `?cate=${cateName}` : ''));
    const data = await res.json();
    let cards = '';
    
    if(data.items && data.items.length > 0){
      cards = data.items.map(item => `
        <a onclick="navigate('/${item.title.split(' —')[0]}/')" class="fcard-link">
          <div class="fcard">
            <div class="fc-tags"><span class="tag ta">${item.cate || cateName || '공통'}</span><span class="tag torg">${item.org || '기관'}</span></div>
            <div class="fc-title">${item.title}</div>
            <div class="fc-desc">${item.summary || '자세한 지원 조건 및 신청 방법을 확인하세요.'}</div>
            <div class="fc-meta">
              <span class="fm">담당부처 <b>${item.org || '-'}</b></span>
              <span class="fm-more">자세히 보기 →</span>
            </div>
          </div>
        </a>
      `).join('');
    } else {
      cards = '<div class="fcard"><div class="fc-desc">해당 카테고리에 데이터가 없습니다.</div></div>';
    }

    const html = `
      <div class="page">
        <div class="cat-hero">
          <div class="cat-badge">${cateName || '전체'} 정책자금</div>
          <h1>${h1}</h1>
          <p class="cat-intro">${desc}</p>
        </div>
        <div class="fund-list">
          <div class="sec-head"><span class="sec-name">지원 정보</span><span class="sec-cnt">${data.items ? data.items.length : 0}건</span></div>
          ${cards}
        </div>
        <div class="faq-section">
          <h2>자주 묻는 질문</h2>
          <div class="faq-item"><div class="faq-q">Q. 정책자금은 상환해야 하나요?</div><div class="faq-a">A. 보조금/지원금 형태는 상환 의무가 없으나, 융자(대출) 형태는 상환이 필요합니다. 상세 페이지를 확인하세요.</div></div>
          <div class="faq-item"><div class="faq-q">Q. 신청은 어디서 하나요?</div><div class="faq-a">A. 각 자금별 공식 주관 기관(소진공, 중진공 등) 홈페이지를 통해 온라인으로 신청 가능합니다.</div></div>
        </div>
      </div>
    `;
    document.getElementById('app').innerHTML = html;
  } catch(e) {
    document.getElementById('app').innerHTML = `<div class="page"><p>데이터를 불러오는 중 오류가 발생했습니다.</p></div>`;
  }
}

async function renderDetail(path) {
  updateNav(path);
  renderLoading();
  let docName = decodeURI(path).replace(/\//g, '');
  
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    const item = data.items ? data.items.find(i => i.title.includes(docName)) : null;
    
    if(!item) {
      document.getElementById('app').innerHTML = `<div class="page"><h2>문서를 찾을 수 없습니다.</h2><p><a onclick="navigate('/')">메인으로 돌아가기</a></p></div>`;
      return;
    }

    const html = `
      <div class="page">
        <div class="d-card">
          <div class="d-top">
            <div class="breadcrumb-nav"><a onclick="navigate('/')">홈</a> › <span>${item.cate || '정책자금'}</span></div>
            <div class="d-tags"><span class="tag ta">${item.cate || '정책자금'}</span><span class="tag torg">${item.org || '정부기관'}</span></div>
            <h1 class="d-title">${item.title}</h1>
            <p class="d-desc">${item.summary || '지원금 상세 내용입니다.'}</p>
          </div>
          <div class="d-summary">
            <div class="d-si"><div class="d-sl">담당 기관</div><div class="d-sv ink">${item.org || '-'}</div></div>
            <div class="d-si"><div class="d-sl">공고 상태</div><div class="d-sv">${item.startDate ? '진행중' : '확인요망'}</div></div>
          </div>
          <div class="d-body">
            <div class="d-stitle">지원 내용</div>
            <div class="info-rows">
              <div class="info-row"><span class="info-k">지원 대상</span><span class="info-v">${item.target || '공고문 참조'}</span></div>
              <div class="info-row"><span class="info-k">지원 내용</span><span class="info-v">${item.summary || '-'}</span></div>
              <div class="info-row"><span class="info-k">접수 기간</span><span class="info-v">${item.startDate ? item.startDate + ' ~ ' + (item.endDate || '') : '상시접수 또는 공고문 참조'}</span></div>
            </div>
            <div class="d-stitle">신청 방법</div>
            <div class="step-list">
              <div class="step-item"><span class="step-n">1</span><span class="step-t">공식 기관 홈페이지 접속 및 공고 확인</span></div>
              <div class="step-item"><span class="step-n">2</span><span class="step-t">필요 서류 준비 및 온라인/오프라인 신청</span></div>
            </div>
            <a class="official-btn" href="${item.url || '#'}" target="_blank" rel="noopener">
              <div class="ob-text">
                <strong>공식 사이트에서 자세히 보기 ↗</strong>
                <span>실제 지원 조건은 반드시 공식 공고문을 확인하세요.</span>
              </div>
            </a>
          </div>
        </div>
      </div>
    `;
    document.getElementById('app').innerHTML = html;
  } catch(e) {
    document.getElementById('app').innerHTML = `<div class="page"><p>데이터를 불러오는 중 오류가 발생했습니다.</p></div>`;
  }
}

function router() {
  const path = window.location.pathname;
  if(path === '/' || path === '/index.html') {
    renderMain();
  } else if(path.includes('-정책자금') || path.includes('-종류') || path.includes('-신청방법') || path.includes('-서민금융')) {
    renderCategory(path);
  } else {
    renderDetail(path);
  }
  window.scrollTo(0,0);
}

function navigate(url) {
  window.history.pushState({}, '', url);
  router();
}

window.addEventListener('popstate', router);
document.addEventListener('DOMContentLoaded', router);
</script>
</body>
</html>
